[workspace]
resolver = "3"
members = ["lib", "cli"]

[workspace.dependencies]
horizon-lib = { path = "lib" }

serde     = { version = "1", features = ["derive"] }
toml      = "0.8"
thiserror = "2"
clap      = { version = "4", features = ["derive"] }
ipnet     = { version = "2", features = ["serde"] }
